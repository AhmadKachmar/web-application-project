<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feedback</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="navdiv">
        <div class="logo"><a href="#">Scratch</a></div>
        <ul class="nav-btns">
          <li><a href="HomePage.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="Q&A.html">Q&A</a></li>
          <li><a href="feedback.html">Feedback</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="feedback-container">
    <h2>Feedback Page</h2>
    <p>We value your feedback! Let us know your thoughts below.</p>

    <form id="feedbackForm">
      <label for="name">Name:</label><br>
      <input type="text" id="name" name="name" required /><br><br>

      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" required /><br><br>

      <label for="comments">Feedback:</label><br>
      <textarea id="comments" name="comments" rows="4" required></textarea><br><br>

      <button type="submit">Submit Feedback</button>
    </form>

    <p id="confirmation" style="display:none; color:green;">
      Thank you for your feedback!
    </p>

    <h3>Previous Feedback</h3>
    <div id="feedbackList" class="feedback-list">
      <!-- Populated via AJAX -->
    </div>
  </main>

  <!-- jQuery + AJAX logic -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(function(){
      // load all feedback from server
      function loadFeedback() {
        $.getJSON('get_feedback.php')
         .done(function(data){
           const $list = $('#feedbackList').empty();
           if (data.error) {
             return $list.append(`<div class="error">${data.error}</div>`);
           }
           data.forEach(fb => {
             $list.append(`
               <div class="feedback-item">
                 <strong>${fb.name}</strong>
                 <em> (${fb.created_at})</em>
                 <p>${fb.comments}</p>
               </div>
             `);
           });
         })
         .fail(function(){
           $('#feedbackList').html('<div class="error">Could not load feedback.</div>');
         });
      }

      // initial fetch
      loadFeedback();
 
      // handle form submit
      $('#feedbackForm').on('submit', function(e){
        e.preventDefault();
        $.ajax({
          url: 'feedback.php',
          method: 'POST',
          data: {
            name:     $('#name').val(),
            email:    $('#email').val(),
            comments: $('#comments').val()
          },
          dataType: 'json'
        })
        .done(function(res){
          if (res.success) {
            $('#feedbackForm')[0].reset();
            $('#confirmation').show();
            loadFeedback();
          } else {
            alert(res.error || 'Submission failed.');
          }
        })
        .fail(function(xhr){
          alert(xhr.responseJSON?.error || 'Server error');
        });
      });
    });
  </script>
